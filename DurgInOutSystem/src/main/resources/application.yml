server:
  port: 8080
spring:
  application:
    name: DurgInOutSystem
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

# JWT — must be set via JWT_SECRET env var or profile-specific config
jwt:
  secret: ${JWT_SECRET}

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.gcky.durginoutsystem.mapper: debug