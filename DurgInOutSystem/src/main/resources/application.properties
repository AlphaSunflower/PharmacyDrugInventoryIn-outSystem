spring.application.name=DurgInOutSystem

# Database — use environment variables with fallback for local dev
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pharmacy_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT
jwt.secret=${JWT_SECRET:}

# MyBatis Plus Configuration
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.mapper-locations=classpath:mapper/*.xml
logging.level.com.gcky.durginoutsystem.mapper=debug
